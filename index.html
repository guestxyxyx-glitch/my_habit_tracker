<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productive RPG Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans flex flex-col items-center py-10 px-4">

    <div class="w-full max-w-md bg-slate-800 rounded-2xl p-6 shadow-2xl border border-slate-700">
        
        <div class="text-center mb-6">
            <h1 class="text-2xl font-black tracking-wider text-amber-400 uppercase">Productive Version of Me</h1>
            <p class="text-xs text-slate-400 mt-1">Ubah kebiasaan menjadi Quest harian!</p>
        </div>

        <div class="grid grid-cols-2 gap-4 bg-slate-900 p-4 rounded-xl border border-slate-700 mb-6 text-center">
            <div>
                <p class="text-xs text-slate-400 font-semibold uppercase tracking-wider">Total XP</p>
                <p id="xp-display" class="text-2xl font-black text-emerald-400">0 XP</p>
            </div>
            <div>
                <p class="text-xs text-slate-400 font-semibold uppercase tracking-wider">🔥 Streak</p>
                <p id="streak-display" class="text-2xl font-black text-orange-400">0 Days</p>
            </div>
        </div>

        <div class="mb-6">
            <div class="flex justify-between text-xs text-slate-400 font-medium mb-1">
                <span>Daily Quest Progress</span>
                <span id="progress-text">0%</span>
            </div>
            <div class="w-full bg-slate-700 rounded-full h-3 overflow-hidden">
                <div id="progress-bar" class="bg-gradient-to-r from-amber-400 to-emerald-400 h-full w-0 transition-all duration-300"></div>
            </div>
        </div>

        <hr class="border-slate-700 mb-6">

        <div class="space-y-3" id="habit-list">
            <label class="flex items-center justify-between p-4 bg-slate-700/50 hover:bg-slate-700 rounded-xl cursor-pointer border border-slate-600 transition-all group">
                <div class="flex items-center space-x-3">
                    <input type="checkbox" class="habit-checkbox w-5 h-5 rounded text-emerald-500 bg-slate-800 border-slate-600 focus:ring-0" data-xp="10">
                    <span class="font-medium group-hover:text-amber-300 transition-colors">🧘 Rutinitas Pagi (Olahraga/Kasur)</span>
                </div>
                <span class="text-xs font-bold bg-slate-800 text-emerald-400 px-2 py-1 rounded border border-slate-600">+10 XP</span>
            </label>

            <label class="flex items-center justify-between p-4 bg-slate-700/50 hover:bg-slate-700 rounded-xl cursor-pointer border border-slate-600 transition-all group">
                <div class="flex items-center space-x-3">
                    <input type="checkbox" class="habit-checkbox w-5 h-5 rounded text-emerald-500 bg-slate-800 border-slate-600 focus:ring-0" data-xp="25">
                    <span class="font-medium group-hover:text-amber-300 transition-colors">💻 Deep Work / Coding / Belajar</span>
                </div>
                <span class="text-xs font-bold bg-slate-800 text-emerald-400 px-2 py-1 rounded border border-slate-600">+25 XP</span>
            </label>

            <label class="flex items-center justify-between p-4 bg-slate-700/50 hover:bg-slate-700 rounded-xl cursor-pointer border border-slate-600 transition-all group">
                <div class="flex items-center space-x-3">
                    <input type="checkbox" class="habit-checkbox w-5 h-5 rounded text-emerald-500 bg-slate-800 border-slate-600 focus:ring-0" data-xp="15">
                    <span class="font-medium group-hover:text-amber-300 transition-colors">📚 Membaca Buku (Min. 5 Hal)</span>
                </div>
                <span class="text-xs font-bold bg-slate-800 text-emerald-400 px-2 py-1 rounded border border-slate-600">+15 XP</span>
            </label>
        </div>

        <button id="reset-btn" class="mt-6 w-full py-2 bg-slate-900 hover:bg-red-900/40 text-xs text-slate-500 hover:text-red-400 rounded-lg transition-colors border border-slate-700">
            Reset Semua Data
        </button>

    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playDingSound() {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(587.33, audioCtx.currentTime); 
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime + 0.1); 
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.4);
        }

        const checkboxes = document.querySelectorAll('.habit-checkbox');
        const xpDisplay = document.getElementById('xp-display');
        const streakDisplay = document.getElementById('streak-display');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');
        const resetBtn = document.getElementById('reset-btn');

        let appData = JSON.parse(localStorage.getItem('rpgTrackerData')) || {
            totalXp: 0,
            streak: 0,
            checkedIds: []
        };

        function updateUI() {
            xpDisplay.textContent = `${appData.totalXp} XP`;
            streakDisplay.textContent = `${appData.streak} Days`;
            
            const totalHabits = checkboxes.length;
            const checkedHabits = appData.checkedIds.length;
            const percentage = totalHabits > 0 ? Math.round((checkedHabits / totalHabits) * 100) : 0;
            
            progressBar.style.width = `${percentage}%`;
            progressText.textContent = `${percentage}%`;

            localStorage.setItem('rpgTrackerData', JSON.stringify(appData));
        }

        checkboxes.forEach((cb, index) => {
            if (appData.checkedIds.includes(index)) {
                cb.checked = true;
                cb.disabled = true;
                cb.parentElement.parentElement.classList.add('opacity-50', 'line-through');
            }

            cb.addEventListener('change', function() {
                if (this.checked) {
                    playDingSound();
                    const xpGained = parseInt(this.getAttribute('data-xp'));
                    appData.totalXp += xpGained;
                    appData.checkedIds.push(index);
                    
                    this.disabled = true;
                    this.parentElement.parentElement.classList.add('opacity-50', 'line-through');

                    if (appData.checkedIds.length === checkboxes.length) {
                        appData.streak += 1;
                    }

                    updateUI();
                }
            });
        });

        resetBtn.addEventListener('click', () => {
            if (confirm("Kamu yakin mau merestart semua progress game-mu?")) {
                localStorage.removeItem('rpgTrackerData');
                appData = { totalXp: 0, streak: 0, checkedIds: [] };
                checkboxes.forEach(cb => {
                    cb.checked = false;
                    cb.disabled = false;
                    cb.parentElement.parentElement.classList.remove('opacity-50', 'line-through');
                });
                updateUI();
            }
        });

        updateUI();
    </script>
</body>
</html>
